<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zákazky</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0d10;
  --s1: #13151a;
  --s2: #1a1d24;
  --s3: #22262f;
  --border: #2c303b;
  --accent: #f0c040;
  --accent2: #e07b30;
  --zello: #1b9e3e;
  --zello2: #17852f;
  --text: #e6e8ee;
  --muted: #5c6375;
  --red: #e05555;
  --green: #3dba52;
  --rec: #e03c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100svh;
  padding-bottom: 80px;
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 50;
  background: var(--s1);
  border-bottom: 2px solid var(--accent);
  padding: 16px 20px 12px;
  display: flex; align-items: flex-end; gap: 14px;
}
header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem; letter-spacing: 4px;
  color: var(--accent); line-height: 1;
}
.hbadge {
  background: var(--accent); color: #000;
  font-weight: 700; font-size: 0.72rem;
  padding: 2px 9px; border-radius: 20px;
  margin-bottom: 3px; white-space: nowrap;
}

/* Zello floating button */
.zello-fab {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  background: var(--zello);
  border: none; border-radius: 50px;
  padding: 8px 14px 8px 10px;
  cursor: pointer;
  color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 600;
  text-decoration: none;
  transition: background 0.15s, transform 0.1s;
  box-shadow: 0 0 0 0 rgba(27,158,62,0.5);
  animation: zelloPulse 2.5s ease infinite;
}
.zello-fab:hover { background: var(--zello2); transform: scale(1.04); }
@keyframes zelloPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(27,158,62,0.45); }
  50%      { box-shadow: 0 0 0 7px rgba(27,158,62,0); }
}
.zello-dot {
  width: 10px; height: 10px;
  background: #fff; border-radius: 50%;
  flex-shrink: 0;
}

/* ── CONTAINER ── */
.wrap { max-width: 680px; margin: 0 auto; padding: 24px 16px; }

/* ── ADD CARD ── */
.add-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 24px;
}
.add-card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem; letter-spacing: 2px;
  color: var(--muted); margin-bottom: 12px;
}

.field { margin-bottom: 10px; }
input[type=text], textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  padding: 10px 13px;
  border-radius: 9px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
input[type=text]:focus, textarea:focus { border-color: var(--accent); }
textarea { resize: vertical; min-height: 64px; }

/* ── MIC ROW ── */
.mic-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.mic-btn {
  flex-shrink: 0;
  width: 46px; height: 46px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--s2);
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.mic-btn:hover { border-color: var(--accent); color: var(--accent); }
.mic-btn.recording {
  background: var(--rec);
  border-color: var(--rec);
  color: #fff;
  animation: recPulse 1s ease infinite;
}
@keyframes recPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(224,60,60,0.5); }
  50%      { box-shadow: 0 0 0 10px rgba(224,60,60,0); }
}
.mic-status {
  font-size: 0.82rem; color: var(--muted);
  flex: 1; min-width: 0;
}
.mic-status.active { color: var(--rec); font-weight: 600; }
.rec-timer { font-variant-numeric: tabular-nums; }

.audio-preview-wrap {
  display: none;
  align-items: center; gap: 8px;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 8px 10px;
  margin-bottom: 12px;
}
.audio-preview-wrap.show { display: flex; }
.audio-preview-wrap audio {
  flex: 1; height: 32px;
  accent-color: var(--accent);
}
.btn-icon-sm {
  background: none; border: none;
  color: var(--muted); cursor: pointer;
  padding: 4px; border-radius: 6px;
  display: flex; align-items: center;
  transition: color 0.15s;
}
.btn-icon-sm:hover { color: var(--red); }

/* ── FILE UPLOAD fallback ── */
.file-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
input[type=file] { display: none; }
.file-lbl {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--s2); border: 1px dashed var(--border);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; padding: 6px 13px;
  border-radius: 8px; cursor: pointer;
  transition: border-color 0.2s, color 0.2s;
}
.file-lbl:hover { border-color: var(--accent); color: var(--accent); }
.file-name { font-size: 0.8rem; color: var(--muted); flex:1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── ADD BTN ── */
.add-btn {
  width: 100%;
  background: var(--accent); color: #000;
  border: none; border-radius: 9px;
  padding: 11px; font-family: 'DM Sans', sans-serif;
  font-weight: 700; font-size: 0.95rem;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
}
.add-btn:hover { background: #f5d360; }
.add-btn:active { transform: scale(0.98); }

/* ── PROGRESS ── */
.stats-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 6px;
  font-size: 0.8rem; color: var(--muted);
}
.stats-row strong { color: var(--text); }
.prog-wrap {
  background: var(--s2); border-radius: 4px;
  height: 4px; margin-bottom: 18px; overflow: hidden;
}
.prog-inner {
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  height: 100%; border-radius: 4px;
  transition: width 0.4s ease;
}

/* ── TABS ── */
.tabs { display: flex; gap: 6px; margin-bottom: 18px; }
.tab {
  background: none; border: 1px solid var(--border);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem; font-weight: 500;
  padding: 6px 15px; border-radius: 20px;
  cursor: pointer; transition: all 0.15s;
}
.tab.active {
  background: var(--accent); border-color: var(--accent);
  color: #000; font-weight: 700;
}

/* ── TASK CARDS ── */
.task-card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 13px 14px;
  margin-bottom: 8px;
  display: flex; gap: 12px; align-items: flex-start;
  transition: border-color 0.2s;
  animation: fadeIn 0.22s ease;
}
@keyframes fadeIn {
  from { opacity:0; transform: translateY(-6px); }
  to   { opacity:1; transform: translateY(0); }
}
.task-card:hover { border-color: var(--s3); }
.task-card.done { background: #0f1510; border-color: #1c2e1e; }

/* checkbox */
.cb-wrap { flex-shrink:0; margin-top:1px; }
.cb-wrap input { display:none; }
.cbmark {
  width: 22px; height: 22px;
  border: 2px solid var(--border); border-radius: 6px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition: all 0.15s;
}
.cb-wrap input:checked + .cbmark {
  background: var(--green); border-color: var(--green);
}
.cbmark svg { opacity:0; transition: opacity 0.15s; }
.cb-wrap input:checked + .cbmark svg { opacity:1; }

.task-body { flex:1; min-width:0; }
.task-title {
  font-size:0.96rem; font-weight:600; color:var(--text);
  word-break:break-word; line-height:1.4;
}
.task-card.done .task-title { text-decoration:line-through; color:#3d6040; }
.task-note {
  font-size:0.82rem; color:var(--muted);
  margin-top:4px; word-break:break-word;
}
.task-card.done .task-note { color:#2e4a30; }
.task-meta {
  display:flex; align-items:center; gap:8px;
  margin-top:7px; flex-wrap:wrap;
}
.task-date { font-size:0.73rem; color:var(--muted); }

/* audio pill */
.audio-pill {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--s2); border:1px solid var(--border);
  border-radius:20px; padding:3px 10px 3px 7px;
  cursor:pointer; font-size:0.76rem; color:var(--muted);
  transition: border-color 0.15s, color 0.15s;
}
.audio-pill:hover { border-color:var(--accent2); color:var(--accent2); }
.pill-dot {
  width:7px; height:7px; border-radius:50%;
  background:var(--accent2); flex-shrink:0;
}

.task-actions { display:flex; flex-direction:column; gap:4px; }
.del-btn {
  background:none; border:none; color:var(--muted);
  cursor:pointer; padding:4px; border-radius:6px;
  display:flex; align-items:center;
  transition: color 0.15s, background 0.15s;
}
.del-btn:hover { color:var(--red); background:rgba(224,85,85,0.1); }

/* empty */
.empty { text-align:center; color:var(--muted); padding:40px 0; font-size:0.9rem; }

/* ── FLOATING PLAYER ── */
.player-modal {
  display:none; position:fixed;
  bottom:20px; left:50%; transform:translateX(-50%);
  background:var(--s2); border:1px solid var(--border);
  border-radius:14px; padding:14px 16px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  z-index:200; min-width:290px; max-width:92vw;
  animation:popUp 0.2s ease;
}
@keyframes popUp {
  from { opacity:0; transform:translateX(-50%) translateY(10px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
.player-modal.open { display:block; }
.pm-head {
  font-size:0.78rem; color:var(--muted);
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px;
}
.pm-close {
  background:none; border:none; color:var(--muted);
  cursor:pointer; font-size:1.1rem; padding:0 3px;
}
.pm-close:hover { color:var(--text); }
.player-modal audio { width:100%; accent-color:var(--accent); }

/* ── VOICE HELP TOOLTIP ── */
.mic-help { font-size:0.76rem; color:var(--muted); margin-bottom:10px; font-style:italic; }
</style>
</head>
<body>

<header>
  <h1>Zákazky</h1>
  <div class="hbadge" id="pendingBadge">0 čaká</div>
  <a class="zello-fab" href="zello://" id="zelloBtn" title="Otvoriť Zello">
    <div class="zello-dot"></div>
    Zello
  </a>
</header>

<div class="wrap">

  <!-- ADD CARD -->
  <div class="add-card">
    <div class="add-card-title">+ Nová zákazka</div>

    <p class="mic-help">💡 Môžeš pridať zákazku iba hlasom — nič písať nemusíš.</p>

    <!-- Live mic -->
    <div class="mic-row">
      <button class="mic-btn" id="micBtn" onclick="toggleRec()" title="Nahrávať hlas">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
        </svg>
      </button>
      <div class="mic-status" id="micStatus">Stlač mikrofón a diktuj zákazku</div>
      <span class="rec-timer" id="recTimer" style="display:none;color:var(--rec);font-weight:700;font-size:0.85rem;"></span>
    </div>

    <!-- Recorded preview -->
    <div class="audio-preview-wrap" id="recPreviewWrap">
      <audio id="recPreview" controls></audio>
      <button class="btn-icon-sm" onclick="clearRecording()" title="Zmazať nahrávku">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Text fields (optional) -->
    <div class="field">
      <input type="text" id="titleInput" placeholder="Názov / adresa (nepovinné)…" />
    </div>
    <div class="field">
      <textarea id="noteInput" placeholder="Poznámka (nepovinné)…"></textarea>
    </div>

    <!-- File upload fallback -->
    <div class="file-row">
      <label class="file-lbl" for="audioFile">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Nahrať súbor
      </label>
      <input type="file" id="audioFile" accept="audio/*" onchange="fileAudio(this)">
      <span class="file-name" id="fileName">žiadny súbor</span>
    </div>

    <button class="add-btn" onclick="addTask()">Pridať zákazku</button>
  </div>

  <!-- PROGRESS -->
  <div class="stats-row">
    <span>Hotové: <strong id="doneCount">0</strong> / <strong id="totalCount">0</strong></span>
    <span id="pctLabel">0 %</span>
  </div>
  <div class="prog-wrap"><div class="prog-inner" id="progBar" style="width:0%"></div></div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="setFilter('all',this)">Všetky</button>
    <button class="tab" onclick="setFilter('pending',this)">Čakajúce</button>
    <button class="tab" onclick="setFilter('done',this)">Hotové</button>
  </div>

  <div id="taskList"></div>
</div>

<!-- FLOATING PLAYER -->
<div class="player-modal" id="playerModal">
  <div class="pm-head">
    <span id="pmLabel">Hlasová poznámka</span>
    <button class="pm-close" onclick="closePlayer()">✕</button>
  </div>
  <audio id="pmAudio" controls></audio>
</div>

<script>
// ── STATE ──
let tasks  = JSON.parse(localStorage.getItem('zakazky2') || '[]');
let filter = 'all';

// recording
let mediaRecorder = null;
let recChunks     = [];
let recInterval   = null;
let recSeconds    = 0;
let recAudioData  = null;  // base64
let recAudioName  = null;

// file upload
let fileAudioData = null;
let fileAudioName = null;

function save() { localStorage.setItem('zakazky2', JSON.stringify(tasks)); }

// ── RECORDING ──
async function toggleRec() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRec();
  } else {
    startRec();
  }
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    // pick best supported format
    const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4','']
      .find(m => m === '' || MediaRecorder.isTypeSupported(m));
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
    recChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
    mediaRecorder.onstop = finishRec;
    mediaRecorder.start(200);

    recSeconds = 0;
    recInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds/60)).padStart(2,'0');
      const s = String(recSeconds%60).padStart(2,'0');
      document.getElementById('recTimer').textContent = m+':'+s;
    }, 1000);

    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micStatus').textContent = 'Nahrávam…';
    document.getElementById('micStatus').classList.add('active');
    document.getElementById('recTimer').style.display = 'inline';
  } catch(e) {
    alert('Mikrofón nie je dostupný: ' + e.message);
  }
}

function stopRec() {
  if (!mediaRecorder) return;
  mediaRecorder.stop();
  mediaRecorder.stream.getTracks().forEach(t => t.stop());
  clearInterval(recInterval);
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micStatus').textContent = 'Hotovo ✓ Prehraj alebo pridaj zákazku';
  document.getElementById('micStatus').classList.remove('active');
  document.getElementById('recTimer').style.display = 'none';
}

function finishRec() {
  const mime = mediaRecorder.mimeType || 'audio/webm';
  const blob = new Blob(recChunks, { type: mime });
  const ext  = mime.includes('ogg') ? 'ogg' : mime.includes('mp4') ? 'mp4' : 'webm';
  recAudioName = 'hlasovka_' + Date.now() + '.' + ext;
  const reader = new FileReader();
  reader.onload = e => {
    recAudioData = e.target.result;
    const preview = document.getElementById('recPreview');
    preview.src = recAudioData;
    document.getElementById('recPreviewWrap').classList.add('show');
  };
  reader.readAsDataURL(blob);
}

function clearRecording() {
  recAudioData = null; recAudioName = null;
  document.getElementById('recPreview').src = '';
  document.getElementById('recPreviewWrap').classList.remove('show');
  document.getElementById('micStatus').textContent = 'Stlač mikrofón a diktuj zákazku';
}

function fileAudio(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    fileAudioData = e.target.result;
    fileAudioName = file.name;
    document.getElementById('fileName').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

// ── ADD TASK ──
function addTask() {
  const title = document.getElementById('titleInput').value.trim();
  const note  = document.getElementById('noteInput').value.trim();
  const audio = recAudioData || fileAudioData || null;
  const audioName = recAudioName || fileAudioName || null;

  // need at least something
  if (!title && !note && !audio) {
    document.getElementById('micStatus').textContent = '⚠️ Nahraj hlasovku alebo napíš aspoň niečo';
    document.getElementById('micStatus').style.color = 'var(--red)';
    setTimeout(() => {
      document.getElementById('micStatus').textContent = 'Stlač mikrofón a diktuj zákazku';
      document.getElementById('micStatus').style.color = '';
    }, 2500);
    return;
  }

  tasks.unshift({
    id: Date.now(),
    title: title || (audioName ? '🎙 ' + audioName : '(bez názvu)'),
    note,
    done: false,
    date: new Date().toLocaleDateString('sk-SK'),
    audio,
    audioName
  });
  save();

  // reset form
  document.getElementById('titleInput').value = '';
  document.getElementById('noteInput').value  = '';
  document.getElementById('audioFile').value  = '';
  document.getElementById('fileName').textContent = 'žiadny súbor';
  fileAudioData = null; fileAudioName = null;
  clearRecording();

  render();
}

// ── TOGGLE / DELETE ──
function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); render(); }
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save(); render();
}

// ── FILTER ──
function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── PLAYER ──
function openPlayer(id) {
  const t = tasks.find(t => t.id === id);
  if (!t || !t.audio) return;
  document.getElementById('pmAudio').src = t.audio;
  document.getElementById('pmLabel').textContent = t.audioName || 'Hlasová poznámka';
  document.getElementById('playerModal').classList.add('open');
}
function closePlayer() {
  document.getElementById('playerModal').classList.remove('open');
  document.getElementById('pmAudio').pause();
}

// ── RENDER ──
function render() {
  let visible = tasks;
  if (filter === 'pending') visible = tasks.filter(t => !t.done);
  if (filter === 'done')    visible = tasks.filter(t =>  t.done);

  const total   = tasks.length;
  const done    = tasks.filter(t => t.done).length;
  const pending = total - done;
  const pct     = total ? Math.round(done/total*100) : 0;

  document.getElementById('pendingBadge').textContent = pending + (pending===1?' čaká':' čaká');
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('pctLabel').textContent   = pct + ' %';
  document.getElementById('progBar').style.width    = pct + '%';

  const list = document.getElementById('taskList');
  if (!visible.length) {
    list.innerHTML = '<div class="empty">Žiadne zákazky</div>';
    return;
  }

  list.innerHTML = visible.map(t => `
    <div class="task-card ${t.done?'done':''}">
      <div class="cb-wrap">
        <input type="checkbox" id="cb${t.id}" ${t.done?'checked':''} onchange="toggleDone(${t.id})">
        <label class="cbmark" for="cb${t.id}">
          <svg width="12" height="12" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </label>
      </div>
      <div class="task-body">
        <div class="task-title">${esc(t.title)}</div>
        ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
        <div class="task-meta">
          <span class="task-date">${t.date}</span>
          ${t.audio ? `
            <span class="audio-pill" onclick="openPlayer(${t.id})">
              <span class="pill-dot"></span>
              ${esc((t.audioName||'hlasovka').substring(0,22))}
            </span>` : ''}
        </div>
      </div>
      <div class="task-actions">
        <button class="del-btn" onclick="deleteTask(${t.id})" title="Zmazať">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Enter in title
document.getElementById('titleInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

render();
</script>
</body>
</html>
